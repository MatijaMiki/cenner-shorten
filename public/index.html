<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Shorten</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="wrap">
    <header class="header">
      <h1 class="title">Shorten</h1>
      <p class="tagline">Personal link shortener</p>
      <button type="button" class="drawer-toggle" id="drawerToggle" aria-label="View saved links" aria-expanded="false" aria-controls="listSection">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M3 5h14M3 10h14M3 15h10"/></svg>
        <span class="drawer-badge" id="drawerBadge" hidden>0</span>
      </button>
    </header>

    <form class="form" id="form">
      <div class="field">
        <label for="url">URL</label>
        <input type="url" id="url" name="url" placeholder="https://example.com/page" required autocomplete="off" />
      </div>
      <div class="row">
        <div class="field optional">
          <label for="code">Short code <span>(optional)</span></label>
          <input
            type="text"
            id="code"
            name="code"
            placeholder="my-link"
            autocomplete="off"
            pattern="[a-zA-Z0-9_-]+"
            maxlength="32"
            title="Use only letters (A–Z), numbers (0–9), underscore (_) and hyphen (-)."
          />
          <div class="help" id="codeHelp">Format: letters, numbers, <code>_</code> and <code>-</code> (max 32).</div>
        </div>
        <div class="field optional">
          <label for="notes">Notes</label>
          <input type="text" id="notes" name="notes" placeholder="Optional note" autocomplete="off" />
        </div>
      </div>
      <button type="submit" class="btn" id="submit">Create short link</button>
    </form>

    <div class="message" id="message" role="status" aria-live="polite"></div>

    <section class="list-section" id="listSection" aria-label="Saved links">
      <div class="list-section-head">
        <h2 class="list-title">Your links</h2>
        <button type="button" class="list-close-btn" id="drawerClose" aria-label="Close links panel">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M5 5l10 10M15 5L5 15"/></svg>
        </button>
      </div>
      <ul class="list" id="list"></ul>
      <p class="empty" id="empty">No links yet. Create one above.</p>
    </section>
  </div>
  <footer class="footer">© cenner.hr 2026</footer>
  <div class="drawer-backdrop" id="drawerBackdrop" aria-hidden="true"></div>
  <div class="modal-overlay" id="deleteModal" aria-hidden="true">
    <div class="modal modal-delete" role="dialog" aria-labelledby="deleteModalTitle" aria-modal="true">
      <div class="delete-modal-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
      </div>
      <h3 class="modal-title" id="deleteModalTitle">Delete link?</h3>
      <p class="delete-modal-body">Deleting <strong id="deleteModalCode" class="delete-modal-code"></strong> is permanent and cannot be undone.</p>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" id="deleteCancel">Cancel</button>
        <button type="button" class="btn btn-danger" id="deleteConfirm">Delete</button>
      </div>
    </div>
  </div>
  <div class="modal-overlay" id="editModal" aria-hidden="true">
    <div class="modal" role="dialog" aria-labelledby="editModalTitle">
      <h3 class="modal-title" id="editModalTitle">Edit link</h3>
      <form id="editForm">
        <input type="hidden" id="editCode" name="code" />
        <div class="field">
          <label for="editUrl">URL</label>
          <input type="url" id="editUrl" name="url" required />
        </div>
        <div class="field">
          <label for="editNotes">Notes</label>
          <input type="text" id="editNotes" name="notes" />
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" id="editCancel">Cancel</button>
          <button type="submit" class="btn">Save</button>
        </div>
      </form>
    </div>
  </div>
  <script type="module" src="app.js"></script>
</body>
</html>
